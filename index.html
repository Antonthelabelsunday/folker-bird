<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Folmer Bird</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="game-container">
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <!-- Name entry screen (shown first) -->
    <div id="name-overlay" class="overlay">
      <div class="overlay-content">
        <img src="title.png" class="ui-title" alt="Folmer Bird" />
        <div class="name-entry-box">
          <p class="name-label">ENTER YOUR NAME</p>
          <input type="text" id="player-name-input" maxlength="14"
                 autocomplete="off" spellcheck="false" placeholder="YOUR NAME" />
          <img src="presstoplay.png" class="ui-presstoplay" id="name-confirm-btn" alt="Confirm" />
        </div>
      </div>
    </div>

    <!-- Start screen -->
    <div id="start-overlay" class="overlay hidden">
      <div class="overlay-content">
        <img src="title.png" class="ui-title" alt="Folmer Bird" />
        <img src="presstoplay.png" class="ui-presstoplay" alt="Press to Play" id="start-btn" />
      </div>
    </div>

    <!-- Game over screen -->
    <div id="gameover-overlay" class="overlay hidden">
      <div class="overlay-content">
        <img src="title.png" class="ui-title" alt="Folmer Bird" />
        <p id="final-score">Score: 0</p>
        <div id="leaderboard" class="leaderboard">
          <div class="lb-loading">Loading scores…</div>
        </div>
        <p id="games-left-msg" class="games-left-msg"></p>
        <img src="presstoplay.png" class="ui-presstoplay" alt="Play Again" id="restart-btn" />
      </div>
    </div>
  </div>

  <!-- Flap animation video -->
  <video id="flapVideo" muted playsinline preload="auto"
         style="position:fixed;left:-9999px;width:1px;height:1px;opacity:0"></video>

  <!-- Fog/atmosphere overlay -->
  <video id="fogVideo" autoplay loop muted playsinline
         style="position:fixed;left:-9999px;width:1px;height:1px;opacity:0"></video>

  <!-- Background music -->
  <audio id="bgMusic" src="music.m4a" loop preload="auto"></audio>

  <script src="script.js?v=13"></script>
</body>
</html>
